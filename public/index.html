<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilotage Distribution — Centre-ville Aix</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#003755;--rouge:#ed432a;--pale:#d3ecfc;--cream:#FAF7F0;--dark:#0B1D3A;--bg:#f0f4f8;--card:#fff;--text:#1a2a3a;--mut:#6b7c8d;--done:#22c55e}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
header{background:linear-gradient(135deg,var(--navy),var(--dark));color:#fff;padding:10px 20px;box-shadow:0 2px 12px rgba(0,0,0,.15);flex-shrink:0}
.hd-top{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:700} header h1 span{color:var(--rouge)}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}.sync-dot.ok{background:#22c55e;box-shadow:0 0 6px #22c55e}.sync-dot.off{background:#ef4444}
.hd-stats{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;align-items:center}
.gs{background:rgba(255,255,255,.1);padding:4px 12px;border-radius:8px;text-align:center}
.gs label{display:block;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:rgba(255,255,255,.5)}
.gs .gv{font-size:20px;font-weight:700;color:#fff}.gs .gv.g{color:#4ade80}.gs .gv.r{color:#fbbf24}
.gp-bar{flex:1;min-width:120px;height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;align-self:center}
.gp-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:4px;transition:width .5s}
.gp-pct{font-size:18px;font-weight:700;color:#4ade80;min-width:50px;text-align:right}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1;min-width:0}
.sb{width:380px;overflow-y:auto;background:var(--card);border-left:1px solid #e2e8f0;flex-shrink:0}
.sb-hd{padding:10px 14px;background:var(--cream);border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;font-size:11px;font-weight:700;color:var(--navy)}

/* SECTOR CARDS */
.sc{padding:8px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .12s}
.sc:hover{background:#f8fafc}.sc.act{background:var(--pale)}
.sc-top{display:flex;align-items:center;gap:8px}
.sc-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.sc-name{font-weight:700;font-size:12px;flex:1}
.sc-badges{display:flex;gap:3px}
.sc-b{font-size:8px;font-weight:600;padding:1px 6px;border-radius:8px;white-space:nowrap}
.sc-bf{background:#ede9fe;color:#5b21b6}.sc-bp{background:#e0f2fe;color:#0369a1}.sc-bg{background:#ecfdf5;color:#166534}
.sc-mid{display:flex;align-items:center;gap:6px;margin-top:4px}
.sc-bar{flex:1;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.sc-pct{font-size:10px;font-weight:700;color:var(--navy);min-width:28px;text-align:right}
.sc-team{font-size:9px;color:var(--navy);font-weight:600;margin-top:2px;min-height:12px}
.sc-link{font-size:9px;color:var(--c);text-decoration:none;margin-top:2px;display:inline-block}.sc-link:hover{text-decoration:underline}

@media(max-width:900px){
  .main{flex-direction:column}
  .sb{width:100%;max-height:40vh;order:-1}
  #map{min-height:300px}
  header{padding:8px 12px}
  .hd-stats{gap:6px}
}
</style>
</head>

// Draw all markers
Z.forEach(s=>{
  state[s.id]={done:0,total:s.a,team:'',checked:{}};
  sectorMarkers[s.id]=[];
  s.mk.forEach(m=>{
    const r=Math.max(4,Math.min(10,Math.sqrt(m.f)*1.8));
    const mk=L.circleMarker([m.lat,m.lon],{

let activeS=null;
function selectSector(id){
  activeS=activeS===id?null:id;
  // Highlight
  Z.forEach(s=>{
    const active=activeS===null||s.id===activeS;
    sectorMarkers[s.id].forEach(mk=>{
      mk.setStyle({fillOpacity:active?.7:.15,opacity:active?1:.3});
    });
    document.getElementById('sc-'+s.id).classList.toggle('act',s.id===activeS);
  });
  if(activeS){
    const pts=sectorMarkers[activeS].map(m=>m.getLatLng());
    if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(.15));
  }else{
    map.setView([45.6895,5.9125],15);
  }
}

      let done=0;const checked={};
      for(let k in d){if(k.startsWith('addr_')&&d[k]===true){done++;checked[k]=true}}
      state[s.id].done=done;
      state[s.id].checked=checked;
      state[s.id].team=d._team||'';
    }else{
      state[s.id].done=0;state[s.id].checked={};state[s.id].team='';
    }
    updateSector(s.id);
    updateGlobal();
  },err=>{
    document.getElementById('syncDot').className='sync-dot off';
    document.getElementById('syncText').textContent='Hors-ligne';
  });
});

function updateSector(id){
  const s=state[id];const sec=Z.find(x=>x.id===id);
  const pct=s.total?Math.round(s.done/s.total*100):0;
  const bf=document.getElementById('bf-'+id);if(bf)bf.style.width=pct+'%';
  const sp=document.getElementById('sp-'+id);if(sp)sp.textContent=s.done+'/'+s.total;
  const sb=document.getElementById('sb-'+id);if(sb){sb.textContent=pct+'%';sb.style.background=pct>=100?'#dcfce7':pct>50?'#ecfdf5':'#ede9fe';sb.style.color=pct>=100?'#166534':pct>50?'#166534':'#5b21b6'}
  const st=document.getElementById('st-'+id);if(st)st.textContent=s.team?'👥 '+s.team:'';
  // Update markers colors
  sectorMarkers[id].forEach(mk=>{
    const key='addr_'+mk._aIdx;
    if(s.checked[key])mk.setStyle({fillColor:'#22c55e',color:'#16a34a',fillOpacity:.9});
    else mk.setStyle({fillColor:sec.c,color:'#fff',fillOpacity:(activeS===null||activeS===id)?.6:.15});
  });
}

function updateGlobal(){
  let t=0,d=0;for(let id in state){t+=state[id].total;d+=state[id].done}
  const p=t?Math.round(d/t*100):0;
  document.getElementById('gTotal').textContent=t;
  document.getElementById('gDone').textContent=d;
  document.getElementById('gLeft').textContent=t-d;
  document.getElementById('gPct').textContent=p+'%';
  document.getElementById('gpFill').style.width=p+'%';
}
</script>
</body></html>
